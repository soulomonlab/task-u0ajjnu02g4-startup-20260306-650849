name: CI - ML smoke tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest -q

  smoke-train:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run smoke training (small dataset)
        env:
          DVC_REMOTE: ${{ secrets.DVC_REMOTE }}
        run: |
          # Install DVC only if repo uses it
          pip install dvc[s3]
          # Pull tiny sample dataset required for smoke test
          dvc pull -f data/sample.dvc || true
          python -m src.train.train --config configs/smoke_train.yaml --dry-run
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: smoke-artifacts
          path: models/smoke/
